name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  merge_group:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Format
        run: pnpm run format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Typecheck
        run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Lint
        run: pnpm run lint

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Knip
        run: pnpm run knip

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Unit
        run: pnpm run test:unit
        env:
          S3_BUCKET_NAME: ${{secrets.S3_BUCKET_NAME}}
          S3_URL: ${{secrets.S3_URL}}
          S3_ACCESS_KEY_ID: ${{secrets.S3_ACCESS_KEY_ID}}
          S3_SECRET_ACCESS_KEY: ${{secrets.S3_SECRET_ACCESS_KEY}}
          S3_PUBLIC_URL: ${{secrets.S3_PUBLIC_URL}}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Integration
        run: pnpm run test:integration
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          S3_BUCKET_NAME: ${{secrets.S3_BUCKET_NAME}}
          S3_URL: ${{secrets.S3_URL}}
          S3_ACCESS_KEY_ID: ${{secrets.S3_ACCESS_KEY_ID}}
          S3_SECRET_ACCESS_KEY: ${{secrets.S3_SECRET_ACCESS_KEY}}
          S3_PUBLIC_URL: ${{secrets.S3_PUBLIC_URL}}

  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/setup

      - name: Storybook
        run: pnpm run test:storybook
        env:
          S3_BUCKET_NAME: ${{secrets.S3_BUCKET_NAME}}
          S3_URL: ${{secrets.S3_URL}}
          S3_ACCESS_KEY_ID: ${{secrets.S3_ACCESS_KEY_ID}}
          S3_SECRET_ACCESS_KEY: ${{secrets.S3_SECRET_ACCESS_KEY}}
          S3_PUBLIC_URL: ${{secrets.S3_PUBLIC_URL}}
